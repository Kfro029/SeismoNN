seed: 42
device: auto

data:
  metadata_path: data/metadata.csv
  data_root: .
  train_split: train
  val_split: val
  batch_size: 4
  num_workers: 2
  normalize: true
  input_shape: [2, 1723, 501]

model:
  name: trace_transformer
  in_channels: 2
  num_classes: 3
  d_model: 128
  nhead: 4
  num_layers: 2
  dim_feedforward: 256
  dropout: 0.1
  temporal_hidden_channels: 32
  max_receivers: 1024

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001

training:
  num_epochs: 3
  metric_to_optimize: val_macro_f1
  output_dir: outputs/trace_transformer

checkpoint:
  class_id_to_crack_count:
    0: 3
    1: 4
    2: 5

tracking:
  enabled: true
  tracking_uri: mlruns
  experiment_name: seismonn
  run_name: trace_transformer
  log_artifacts: true
