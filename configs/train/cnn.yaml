seed: 42
device: auto

data:
  metadata_path: data/metadata.csv
  data_root: .
  train_split: train
  val_split: val
  batch_size: 16
  num_workers: 2
  normalize: true
  input_shape: [2, 1723, 501]

model:
  name: cnn_baseline
  in_channels: 2
  num_classes: 3
  dropout: 0.2

optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0001

training:
  num_epochs: 3
  metric_to_optimize: val_macro_f1
  output_dir: outputs/cnn_baseline

checkpoint:
  class_id_to_crack_count:
    0: 3
    1: 4
    2: 5
