seed: 42
device: auto

data:
  metadata_path: data/metadata.csv
  data_root: .
  train_split: train
  val_split: val
  batch_size: 2
  num_workers: 2
  normalize: true
  input_shape: [2, 1723, 501]

model:
  name: masked_trace_transformer
  in_channels: 2
  time_steps: 1723
  d_model: 64
  nhead: 4
  num_layers: 1
  dim_feedforward: 128
  dropout: 0.1
  temporal_hidden_channels: 16
  max_receivers: 1024

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001

pretraining:
  num_epochs: 1
  mask_ratio: 0.15
  metric_to_optimize: val_masked_mse
  output_dir: outputs/masked_trace_pretraining

tracking:
  enabled: true
  tracking_uri: mlruns
  experiment_name: seismonn
  run_name: masked_trace_pretraining
  log_artifacts: true