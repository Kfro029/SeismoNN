max_epochs: 5
accelerator: auto
devices: 1
precision: 32
log_every_n_steps: 10

enable_checkpointing: true
metric_to_monitor: val_macro_f1
monitor_mode: max

checkpoint:
  dirname: checkpoints
  filename: best-{epoch:03d}-{val_macro_f1:.4f}
  save_top_k: 1
  save_last: true
  save_deployment_checkpoint: true
  deployment_filename: best.pt

enable_learning_rate_monitor: true
enable_progress_bar: true
enable_model_summary: true

deterministic: false
gradient_clip_val: 0.0
accumulate_grad_batches: 1
